---
deployment:
  tasks:
    - export APPROOT=/home/abecababetisfifa/fifa2026
    - export PUBDEST=/home/abecababetisfifa/public_html

    # Sync Laravel app files to fifa2026/
    - /bin/rsync -a --exclude='public/' --exclude='.git/' --exclude='node_modules/' ./ $APPROOT/

    # Sync public assets to public_html/
    - /bin/cp -f public/index-production.php $PUBDEST/index.php
    - /bin/cp -f public/.htaccess $PUBDEST/.htaccess
    - /bin/cp -rf public/css $PUBDEST/
    - /bin/cp -rf public/js $PUBDEST/
    - /bin/cp -rf public/images $PUBDEST/
    - /bin/cp -f public/manifest.json $PUBDEST/manifest.json
    - /bin/cp -f public/sw.js $PUBDEST/sw.js

    # Run artisan commands from app root
    - /usr/local/bin/php $APPROOT/artisan config:cache
    - /usr/local/bin/php $APPROOT/artisan route:cache
    - /usr/local/bin/php $APPROOT/artisan optimize
    - /usr/local/bin/php $APPROOT/artisan migrate --force
