---
deployment:
  tasks:
    - export APPROOT=/home/abecababetisfifa/fifa2026
    - export PUBDEST=/home/abecababetisfifa/public_html
    - export REPOROOT=/home/abecababetisfifa/repositories/fifa2026

    # Copy only changed app folders (skip vendor - already on server)
    - /bin/cp -rf $REPOROOT/app $APPROOT/
    - /bin/cp -rf $REPOROOT/bootstrap $APPROOT/
    - /bin/cp -rf $REPOROOT/config $APPROOT/
    - /bin/cp -rf $REPOROOT/database $APPROOT/
    - /bin/cp -rf $REPOROOT/resources $APPROOT/
    - /bin/cp -rf $REPOROOT/routes $APPROOT/
    - /bin/cp -f $REPOROOT/artisan $APPROOT/
    - /bin/cp -f $REPOROOT/composer.json $APPROOT/

    # Copy public assets to public_html
    - /bin/cp -f $REPOROOT/public/index-production.php $PUBDEST/index.php
    - /bin/cp -f $REPOROOT/public/htaccess.production $PUBDEST/.htaccess
    - /bin/cp -rf $REPOROOT/public/css $PUBDEST/
    - /bin/cp -rf $REPOROOT/public/js $PUBDEST/
    - /bin/cp -rf $REPOROOT/public/images $PUBDEST/
    - /bin/cp -f $REPOROOT/public/manifest.production.json $PUBDEST/manifest.json
    - /bin/cp -f $REPOROOT/public/sw.production.js $PUBDEST/sw.js

    # Create storage symlink in public_html (web root) so uploaded files are accessible
    - mkdir -p $APPROOT/storage/app/public/profiles
    - chmod -R 775 $APPROOT/storage
    - ln -sfn $APPROOT/storage/app/public $PUBDEST/storage

    # Run artisan commands
    - /usr/local/bin/php $APPROOT/artisan config:cache
    - /usr/local/bin/php $APPROOT/artisan route:cache
    - /usr/local/bin/php $APPROOT/artisan optimize
    - /usr/local/bin/php $APPROOT/artisan migrate --force
