---
deployment:
  tasks:
    - export APPROOT=/home/gavilacfia/gavilacfifa2026
    - export PUBDEST=/home/gavilacfia/public_html

    # Ensure storage & cache dirs exist (git skips empty folders)
    - mkdir -p $APPROOT/storage/framework/cache
    - mkdir -p $APPROOT/storage/framework/sessions
    - mkdir -p $APPROOT/storage/framework/views
    - mkdir -p $APPROOT/storage/app/public
    - mkdir -p $APPROOT/bootstrap/cache

    # Install PHP dependencies
    - /usr/local/bin/composer install --no-dev --optimize-autoloader --working-dir=$APPROOT

    # Copy built assets to public_html
    - /bin/cp -f $APPROOT/public/index-production.php $PUBDEST/index.php
    - /bin/cp -f $APPROOT/public/htaccess.production $PUBDEST/.htaccess
    - /bin/cp -rf $APPROOT/public/css $PUBDEST/
    - /bin/cp -rf $APPROOT/public/js $PUBDEST/
    - /bin/cp -rf $APPROOT/public/images $PUBDEST/
    - /bin/cp -f $APPROOT/public/manifest.production.json $PUBDEST/manifest.json
    - /bin/cp -f $APPROOT/public/sw.production.js $PUBDEST/sw.js

    # Profiles upload folder
    - mkdir -p $PUBDEST/images/profiles
    - chmod -R 775 $PUBDEST/images/profiles

    # Fix permissions
    - chmod -R 775 $APPROOT/storage
    - chmod -R 775 $APPROOT/bootstrap/cache

    # Laravel setup
    - /usr/local/bin/php $APPROOT/artisan key:generate --force
    - /usr/local/bin/php $APPROOT/artisan storage:link --force
    - /usr/local/bin/php $APPROOT/artisan migrate --force
    - /usr/local/bin/php $APPROOT/artisan config:cache
    - /usr/local/bin/php $APPROOT/artisan route:cache
    - /usr/local/bin/php $APPROOT/artisan optimize
